<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <title>Steamheart — a machine-building puzzle game</title>
    <meta name="description" content="Build steam-powered machines by placing gears and axles to connect the source to the target. A steampunk puzzle game made for Gamedev.js Jam 2026." />
    <meta name="author" content="Max Basev" />

    <!-- Open Graph / social sharing -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="Steamheart — a machine-building puzzle game" />
    <meta property="og:description" content="Build steam-powered machines by placing gears and axles to connect the source to the target. A steampunk puzzle game made for Gamedev.js Jam 2026." />
    <meta property="og:image"       content="/og-image.png" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="669" />

    <!-- Twitter / X card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="Steamheart — a machine-building puzzle game" />
    <meta name="twitter:description" content="Build steam-powered machines by placing gears and axles to connect the source to the target. A steampunk puzzle game made for Gamedev.js Jam 2026." />
    <meta name="twitter:image"       content="/og-image.png" />
    <meta name="twitter:site"        content="@maxbasev" />
    <meta name="twitter:creator"     content="@maxbasev" />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #111111;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100vw;
        height: 100vh;
      }
      canvas {
        display: block;
      }
      #rotate-prompt {
        display: none;
        position: fixed;
        inset: 0;
        background: #111;
        color: #b87820;
        font-family: monospace;
        font-size: 18px;
        align-items: center;
        justify-content: center;
        text-align: center;
        z-index: 9999;
        line-height: 1.6;
      }
      @media (orientation: portrait) {
        #rotate-prompt { display: flex; }
      }
    </style>
  </head>
  <body>
    <div id="rotate-prompt">↩ Please rotate your device<br>to landscape mode</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
